# Optional: Render Blueprint — https://render.com/docs/blueprint-spec
# Set MONGODB_URI in the Render dashboard (MongoDB Atlas connection string).
services:
  - type: web
    name: finance-dashboard-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MOCK_JWT_SECRET
        generateValue: true
